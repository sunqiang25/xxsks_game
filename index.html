<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b1026">
  <meta name="format-detection" content="telephone=no">
  <!-- iOS 全屏/状态栏 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="口算大冒险">
  <title>🚀 口算太空大冒险</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css?v=3">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230b1026'/><text y='.9em' x='6' font-size='78'>🚀</text></svg>">
</head>
<body>
  <div id="app"></div>

  <script src="js/questions.js?v=3"></script>
  <script src="js/levels.js?v=3"></script>
  <script src="js/english.js?v=3"></script>
  <script src="js/subjects.js?v=3"></script>
  <script src="js/storage.js?v=3"></script>
  <script src="js/sound.js?v=3"></script>
  <script src="js/game.js?v=3"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      window.Game.init();
    });
    // 注册 Service Worker（仅在 http/https 下生效，本地 file:// 会静默跳过）
    if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
      // 新 SW 接管后自动刷新一次，确保用户拿到最新代码（跳出旧缓存）
      var refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshed) return;
        refreshed = true;
        window.location.reload();
      });
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          reg.update();
        }).catch(function () {});
      });
    }
  </script>
</body>
</html>
